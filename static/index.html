<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude CLI Terminal</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230d1117'/%3E%3Ctext x='8' y='43' font-family='monospace' font-size='36' font-weight='bold' fill='%23d4a574'%3E%3E_%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2129;
  --surface3: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --accent: #d4a574;
  --accent-hover: #e0b88a;
  --danger: #f85149;
  --success: #3fb950;
  --sidebar-width: 260px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* --- Sidebar --- */
.sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: margin-left 0.2s ease;
}

.sidebar.collapsed {
  margin-left: calc(-1 * var(--sidebar-width));
}

.sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
}

.sidebar-header .logo {
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: -0.3px;
}

.sidebar-header .logo span {
  color: var(--text-muted);
  font-weight: 400;
}

.sidebar-toggle-btn {
  width: 24px;
  height: 24px;
  border: none;
  background: none;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

.sidebar-toggle-btn:hover {
  background: var(--surface2);
  color: var(--text);
}

.sidebar-section-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px 6px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.new-session-btn {
  width: 22px;
  height: 22px;
  border: 1px dashed var(--border);
  border-radius: 4px;
  background: none;
  color: var(--text-muted);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.new-session-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(212, 165, 116, 0.08);
}

.session-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 8px;
  scrollbar-width: thin;
  scrollbar-color: var(--surface3) transparent;
}

.session-list::-webkit-scrollbar { width: 4px; }
.session-list::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

.session-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.12s;
  user-select: none;
  position: relative;
}

.session-item:hover {
  background: var(--surface2);
}

.session-item.active {
  background: var(--surface3);
}

.session-item .status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--success);
  flex-shrink: 0;
}

.session-item .status-dot.dead {
  background: var(--text-muted);
}

.session-item-info {
  flex: 1;
  min-width: 0;
}

.session-item-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.session-item.active .session-item-name {
  color: var(--accent);
}

.session-item-meta {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 1px;
}

.session-item-actions {
  display: flex;
  gap: 2px;
  opacity: 0;
  transition: opacity 0.12s;
}

.session-item:hover .session-item-actions {
  opacity: 1;
}

.session-item-actions button {
  width: 22px;
  height: 22px;
  border: none;
  background: none;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 4px;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.session-item-actions button:hover {
  background: var(--surface3);
  color: var(--text);
}

.session-item-actions button.danger-btn:hover {
  background: rgba(248, 81, 73, 0.15);
  color: var(--danger);
}

/* Rename input in sidebar */
.session-rename-input {
  background: var(--bg);
  border: 1px solid var(--accent);
  color: var(--text);
  font-size: 13px;
  padding: 2px 6px;
  border-radius: 4px;
  outline: none;
  width: 100%;
  font-weight: 500;
}

/* Sidebar footer */
.sidebar-footer {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  font-size: 10px;
  color: var(--text-muted);
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.sidebar-footer kbd {
  display: inline-block;
  padding: 0 3px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 3px;
  font-size: 9px;
  font-family: inherit;
  line-height: 16px;
}

/* --- Main content --- */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* Header bar (minimal, with sidebar toggle when collapsed) */
.header {
  display: flex;
  align-items: center;
  padding: 6px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  gap: 10px;
  flex-shrink: 0;
  min-height: 36px;
}

.header .sidebar-open-btn {
  width: 28px;
  height: 28px;
  border: none;
  background: none;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 4px;
  font-size: 16px;
  display: none;
  align-items: center;
  justify-content: center;
}

.header .sidebar-open-btn:hover {
  background: var(--surface2);
  color: var(--text);
}

.sidebar.collapsed ~ .main .sidebar-open-btn {
  display: flex;
}

.header .current-session-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  flex: 1;
}

.header .current-session-status {
  font-size: 11px;
  color: var(--text-muted);
}

/* Tabs in header */
.tabs-container {
  display: flex;
  align-items: center;
  flex: 1;
  overflow-x: auto;
  gap: 2px;
  scrollbar-width: none;
}
.tabs-container::-webkit-scrollbar { display: none; }

.tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 5px;
  color: var(--text-muted);
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  user-select: none;
}

.tab:hover {
  background: var(--surface2);
  color: var(--text);
}

.tab.active {
  background: var(--surface2);
  border-color: var(--border);
  color: var(--text);
}

.tab .status-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--success);
  flex-shrink: 0;
}

.tab .status-dot.dead {
  background: var(--text-muted);
}

.tab .tab-name {
  max-width: 120px;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tab .close-btn {
  display: none;
  width: 14px;
  height: 14px;
  border: none;
  background: none;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 3px;
  font-size: 13px;
  line-height: 14px;
  text-align: center;
}

.tab:hover .close-btn { display: block; }
.tab .close-btn:hover {
  background: var(--danger);
  color: white;
}

.new-tab-btn-header {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
  border: 1px dashed var(--border);
  border-radius: 5px;
  background: none;
  color: var(--text-muted);
  font-size: 14px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.15s;
}

.new-tab-btn-header:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* Terminal area */
.terminal-area {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.terminal-pane {
  position: absolute;
  inset: 0;
  display: none;
  padding: 4px;
}

.terminal-pane.active {
  display: block;
}

.terminal-pane .xterm {
  height: 100%;
}

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 16px;
  color: var(--text-muted);
}

.empty-state .prompt {
  font-size: 40px;
  color: var(--accent);
  opacity: 0.4;
}

.empty-state p { font-size: 14px; }

.empty-state button {
  padding: 8px 20px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}

.empty-state button:hover {
  background: var(--accent-hover);
}

/* New session modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}

.modal-overlay.show { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  width: 420px;
  max-width: 90vw;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

.modal h3 {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 18px;
  color: var(--text);
}

.modal-field {
  margin-bottom: 14px;
}

.modal-field label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.modal-field input {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
  outline: none;
  transition: border-color 0.15s;
}

.modal-field input:focus {
  border-color: var(--accent);
}

.modal-field input::placeholder {
  color: var(--text-muted);
  opacity: 0.6;
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 20px;
}

.modal-actions button {
  padding: 7px 16px;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
}

.modal-btn-cancel {
  background: var(--surface3);
  color: var(--text-muted);
}

.modal-btn-cancel:hover {
  background: var(--border);
  color: var(--text);
}

.modal-btn-create {
  background: var(--accent);
  color: var(--bg);
}

.modal-btn-create:hover {
  background: var(--accent-hover);
}

/* Folder browser */
.dir-browser {
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  max-height: 260px;
  overflow-y: auto;
}

.dir-browser::-webkit-scrollbar { width: 6px; }
.dir-browser::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

.dir-current {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 10px;
  font-size: 12px;
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
  color: var(--accent);
  border-bottom: 1px solid var(--border);
  word-break: break-all;
}

.dir-up-btn {
  flex-shrink: 0;
  width: 24px;
  height: 24px;
  border: none;
  background: var(--surface3);
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

.dir-up-btn:hover {
  background: var(--border);
  color: var(--text);
}

.dir-list {
  list-style: none;
  padding: 4px 0;
}

.dir-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 12px;
  font-size: 12px;
  color: var(--text);
  cursor: pointer;
  transition: background 0.1s;
}

.dir-item:hover {
  background: var(--surface2);
}

.dir-item .dir-icon {
  color: var(--accent);
  font-size: 13px;
  flex-shrink: 0;
  width: 16px;
  text-align: center;
}

.dir-empty {
  padding: 12px;
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
}

.dir-select-btn {
  display: block;
  width: 100%;
  padding: 8px;
  background: none;
  border: none;
  border-top: 1px solid var(--border);
  color: var(--accent);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.1s;
}

.dir-select-btn:hover {
  background: var(--surface2);
}

/* Rename input (inline tab) */
.tab-rename-input {
  background: var(--bg);
  border: 1px solid var(--accent);
  color: var(--text);
  font-size: 11px;
  padding: 1px 4px;
  border-radius: 3px;
  outline: none;
  width: 90px;
}

/* Context menu */
.context-menu {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px;
  min-width: 160px;
  z-index: 1000;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  display: none;
}

.context-menu.show { display: block; }

.context-menu-item {
  display: block;
  width: 100%;
  padding: 6px 10px;
  background: none;
  border: none;
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  border-radius: 4px;
  text-align: left;
}

.context-menu-item:hover { background: var(--surface2); }
.context-menu-item.danger { color: var(--danger); }

/* Status bar */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 3px 12px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-muted);
  flex-shrink: 0;
}

kbd {
  display: inline-block;
  padding: 0 4px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 3px;
  font-size: 10px;
  font-family: inherit;
  line-height: 18px;
}

/* SVG icons inline */
.icon {
  width: 14px;
  height: 14px;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* --- External processes section --- */
.external-section {
  border-top: 1px solid var(--border);
}

.external-section .sidebar-section-title {
  padding: 10px 16px 6px;
}

.external-section .sidebar-section-title .badge {
  background: var(--surface3);
  color: var(--text-muted);
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 8px;
  font-weight: 500;
}

.external-list {
  max-height: 200px;
  overflow-y: auto;
  padding: 4px 8px;
  scrollbar-width: thin;
  scrollbar-color: var(--surface3) transparent;
}

.external-list::-webkit-scrollbar { width: 4px; }
.external-list::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

.external-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 7px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.12s;
  user-select: none;
}

.external-item:hover {
  background: var(--surface2);
}

.external-item-actions {
  display: none;
  gap: 2px;
  align-self: center;
  flex-shrink: 0;
}

.external-item:hover .external-item-actions {
  display: flex;
}

.external-item-actions button {
  width: 22px;
  height: 22px;
  border: none;
  background: none;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 4px;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.external-item-actions button:hover {
  background: var(--surface3);
  color: var(--text);
}

.external-item-actions button.ext-kill-btn:hover {
  background: rgba(248, 81, 73, 0.15);
  color: var(--danger);
}

.external-item .status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #58a6ff;
  flex-shrink: 0;
  margin-top: 5px;
}

.external-item-info {
  flex: 1;
  min-width: 0;
}

.external-item-name {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.external-item-meta {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.external-item-meta .ext-tag {
  display: inline-block;
  background: rgba(88, 166, 255, 0.12);
  color: #58a6ff;
  font-size: 9px;
  padding: 0 4px;
  border-radius: 3px;
  margin-right: 4px;
  font-weight: 500;
}

.external-empty {
  padding: 8px 10px;
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
  font-style: italic;
}

/* External session action popup */
.ext-action-menu {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px;
  min-width: 220px;
  z-index: 1001;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  display: none;
}

.ext-action-menu.show { display: block; }

.ext-action-menu-header {
  padding: 6px 10px 8px;
  font-size: 11px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}

.ext-action-menu-header strong {
  color: var(--text);
  font-size: 12px;
  display: block;
  margin-bottom: 2px;
}

.ext-action-item {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 8px 10px;
  background: none;
  border: none;
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  border-radius: 5px;
  text-align: left;
}

.ext-action-item:hover {
  background: var(--surface2);
}

.ext-action-item .action-icon {
  width: 16px;
  text-align: center;
  flex-shrink: 0;
  font-size: 13px;
}

.ext-action-item .action-desc {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 1px;
}

.ext-action-item .action-text {
  display: flex;
  flex-direction: column;
}
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo">Claude CLI <span>Terminal</span></div>
    <button class="sidebar-toggle-btn" id="sidebarCollapseBtn" title="Collapse sidebar">
      <svg class="icon" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
  </div>

  <div class="sidebar-section-title">
    <span>Sessions</span>
    <button class="new-session-btn" id="newSessionBtn" title="New session (Ctrl+Shift+T)">+</button>
  </div>

  <div class="session-list" id="sessionList">
    <!-- session items rendered here -->
  </div>

  <div class="external-section" id="externalSection">
    <div class="sidebar-section-title">
      <span>External <span class="badge" id="externalBadge">0</span></span>
    </div>
    <div class="external-list" id="externalList">
      <div class="external-empty">No external sessions detected</div>
    </div>
  </div>

  <div class="sidebar-footer">
    <div><kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>T</kbd> new session</div>
    <div><kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>&larr;</kbd><kbd>&rarr;</kbd> switch</div>
    <div><kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>W</kbd> close</div>
    <div><kbd>Ctrl</kbd>+<kbd>B</kbd> toggle sidebar</div>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <div class="header">
    <button class="sidebar-open-btn" id="sidebarOpenBtn" title="Open sidebar (Ctrl+B)">

  <div class="status-bar">
    <span id="statusLeft">Ready</span>
    <span id="statusRight">Sessions: <span id="sessionCount">0</span></span>

<div class="ext-action-menu" id="extActionMenu">

</div>

<!-- New session modal -->
<div class="modal-overlay" id="newSessionModal">
  <div class="modal">
    <h3>New Session</h3>
    <div class="modal-field">
      <label for="modalSessionName">Session Name</label>
      <input type="text" id="modalSessionName" placeholder="Session 1">
    </div>
    <div class="modal-field">
      <label>Working Directory</label>
      <div class="dir-browser" id="dirBrowser">
        <div class="dir-current">
          <button class="dir-up-btn" id="dirUpBtn" title="Parent directory">↑</button>
          <span id="dirCurrentPath">~</span>
        </div>
        <ul class="dir-list" id="dirList"></ul>
        <button class="dir-select-btn" id="dirSelectBtn">Select this directory</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn-cancel" id="modalCancel">Cancel</button>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
<script>
const sessions = new Map(); // id -> { terminal, ws, tab, pane, sidebarItem, fitAddon, name, alive, createdAt }
let activeSessionId = null;
let sessionCounter = 0;

const TERM_THEME = {
  background: '#0d1117',
  foreground: '#e6edf3',
  cursor: '#d4a574',
  cursorAccent: '#0d1117',
  selectionBackground: 'rgba(212, 165, 116, 0.25)',
  black: '#484f58', red: '#ff7b72', green: '#3fb950', yellow: '#d29922',
  blue: '#58a6ff', magenta: '#bc8cff', cyan: '#39d353', white: '#b1bac4',
  brightBlack: '#6e7681', brightRed: '#ffa198', brightGreen: '#56d364',
  brightYellow: '#e3b341', brightBlue: '#79c0ff', brightMagenta: '#d2a8ff',
  brightCyan: '#56d364', brightWhite: '#f0f6fc',
};

// --- API helpers ---

async function apiCreateSession(name, workingDir, extraArgs) {
  const body = { name };
  if (workingDir) body.working_dir = workingDir;
  if (extraArgs) body.extra_args = extraArgs;
  const res = await fetch('/api/sessions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Failed to create session');
  return data;
}

async function apiDeleteSession(id) {
  await fetch(`/api/sessions/${id}`, { method: 'DELETE' });
}

async function apiRenameSession(id, name) {
  await fetch(`/api/sessions/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name })
  });
}

async function apiListSessions() {
  const res = await fetch('/api/sessions');
  return res.json();
}

// --- Terminal factory ---

function createTerminal() {
  const terminal = new Terminal({
    cursorBlink: true,
    fontSize: 14,
    fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', Menlo, monospace",
    theme: TERM_THEME,
    allowProposedApi: true,
  });
  const fitAddon = new FitAddon.FitAddon();
  terminal.loadAddon(fitAddon);
  terminal.loadAddon(new WebLinksAddon.WebLinksAddon());
  return { terminal, fitAddon };
}

function connectWebSocket(id, terminal, fitAddon) {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws/${id}`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    fitAddon.fit();
    ws.send(JSON.stringify({ type: 'resize', cols: terminal.cols, rows: terminal.rows }));
  };

  ws.onmessage = (event) => {
    if (typeof event.data === 'string') {
      try {
        const msg = JSON.parse(event.data);
        if (msg.type === 'exit') {
          const s = sessions.get(id);
          if (s) {
            s.alive = false;
            updateSessionStatus(id);
            terminal.writeln('\r\n\x1b[90m--- Session ended ---\x1b[0m');
          }
        }
      } catch {}
    } else {
      terminal.write(new Uint8Array(event.data));
    }
  };

  ws.onclose = () => {
    const s = sessions.get(id);
    if (s) { s.alive = false; updateSessionStatus(id); }
  };

  terminal.onData(data => {
    if (ws.readyState === WebSocket.OPEN) {
      ws.send(new TextEncoder().encode(data));
    }
  });

  terminal.onResize(({ cols, rows }) => {
    if (ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'resize', cols, rows }));
    }
  });

  return ws;
}

// --- Session management ---

async function createSession(name, workingDir, extraArgs) {
  sessionCounter++;
  const sessionName = name || `Session ${sessionCounter}`;
  const { id } = await apiCreateSession(sessionName, workingDir, extraArgs);

  const { terminal, fitAddon } = createTerminal();

  const pane = document.createElement('div');
  pane.className = 'terminal-pane';
  pane.id = `pane-${id}`;
  document.getElementById('terminalArea').appendChild(pane);
  terminal.open(pane);

  const ws = connectWebSocket(id, terminal, fitAddon);
  const tab = createTabElement(id, sessionName);
  const sidebarItem = createSidebarItem(id, sessionName);

  sessions.set(id, {
    terminal, ws, tab, pane, sidebarItem, fitAddon,
    name: sessionName, alive: true, createdAt: Date.now()
  });

  switchToSession(id);
  fitAddon.fit();
  updateEmptyState();
  updateSessionCount();

  return id;
}

// --- Tab element ---

function createTabElement(id, name) {
  const tab = document.createElement('div');
  tab.className = 'tab';
  tab.dataset.id = id;
  tab.innerHTML = `
    <span class="status-dot"></span>
    <span class="tab-name">${escapeHtml(name)}</span>
    <button class="close-btn" title="Close">&times;</button>
  `;

  tab.addEventListener('click', (e) => {
    if (e.target.classList.contains('close-btn')) closeSession(id);
    else switchToSession(id);
  });

  tab.addEventListener('dblclick', (e) => {
    if (!e.target.classList.contains('close-btn')) startRenameTab(id);
  });

  tab.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    showContextMenu(e, id);
  });

  document.getElementById('tabs').appendChild(tab);
  return tab;
}

// --- Sidebar item ---

function createSidebarItem(id, name) {
  const item = document.createElement('div');
  item.className = 'session-item';
  item.dataset.id = id;

  const now = new Date();
  const timeStr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

  item.innerHTML = `
    <span class="status-dot"></span>
    <div class="session-item-info">
      <div class="session-item-name">${escapeHtml(name)}</div>
      <div class="session-item-meta">Started ${timeStr}</div>
    </div>
    <div class="session-item-actions">
      <button class="rename-btn" title="Rename">
        <svg class="icon" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <button class="danger-btn" title="Close">
        <svg class="icon" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  `;

  item.addEventListener('click', (e) => {
    if (e.target.closest('.rename-btn')) { startRenameSidebar(id); return; }
    if (e.target.closest('.danger-btn')) { closeSession(id); return; }
    switchToSession(id);
  });

  item.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    showContextMenu(e, id);
  });

  document.getElementById('sessionList').appendChild(item);
  return item;
}

// --- Switch session ---

function switchToSession(id) {
  // Deactivate current
  if (activeSessionId && activeSessionId !== id) {
    const prev = sessions.get(activeSessionId);
    if (prev) {
      prev.tab.classList.remove('active');
      prev.pane.classList.remove('active');
      prev.sidebarItem.classList.remove('active');
    }
  }

  activeSessionId = id;
  const session = sessions.get(id);
  if (session) {
    session.tab.classList.add('active');
    session.pane.classList.add('active');
    session.sidebarItem.classList.add('active');
    session.fitAddon.fit();
    session.terminal.focus();
    updateStatusBar(session);

    // Scroll sidebar item into view
    session.sidebarItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

// --- Close session ---

async function closeSession(id) {
  const session = sessions.get(id);
  if (!session) return;

  await apiDeleteSession(id);
  session.ws.close();
  session.terminal.dispose();
  session.tab.remove();
  session.pane.remove();
  session.sidebarItem.remove();
  sessions.delete(id);

  if (activeSessionId === id) {
    activeSessionId = null;
    const remaining = [...sessions.keys()];
    if (remaining.length > 0) {
      switchToSession(remaining[remaining.length - 1]);
    }
  }

  updateEmptyState();
  updateSessionCount();
}

// --- Status updates ---

function updateSessionStatus(id) {
  const session = sessions.get(id);
  if (!session) return;

  // Tab dot
  const tabDot = session.tab.querySelector('.status-dot');
  if (tabDot) tabDot.className = `status-dot${session.alive ? '' : ' dead'}`;

  // Sidebar dot
  const sidebarDot = session.sidebarItem.querySelector('.status-dot');
  if (sidebarDot) sidebarDot.className = `status-dot${session.alive ? '' : ' dead'}`;

  // Sidebar meta
  const meta = session.sidebarItem.querySelector('.session-item-meta');
  if (meta && !session.alive) meta.textContent = 'Ended';

  if (activeSessionId === id) updateStatusBar(session);
}

function updateEmptyState() {
  document.getElementById('emptyState').style.display = sessions.size === 0 ? 'flex' : 'none';
}

function updateStatusBar(session) {
  const left = document.getElementById('statusLeft');
  left.textContent = session
    ? `${session.name} ${session.alive ? '(running)' : '(ended)'}`
    : 'Ready';
}

function updateSessionCount() {
  document.getElementById('sessionCount').textContent = sessions.size;
}

// --- Rename (tab) ---

function startRenameTab(id) {
  const session = sessions.get(id);
  if (!session) return;

  const nameEl = session.tab.querySelector('.tab-name');
  const input = document.createElement('input');
  input.className = 'tab-rename-input';
  input.value = session.name;

  const finish = async () => {
    const newName = input.value.trim() || session.name;
    applyRename(id, newName);
    nameEl.style.display = '';
    input.remove();
  };

  input.addEventListener('blur', finish);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') finish();
    if (e.key === 'Escape') { nameEl.style.display = ''; input.remove(); }
    e.stopPropagation();
  });

  nameEl.style.display = 'none';
  nameEl.parentNode.insertBefore(input, nameEl.nextSibling);
  input.focus();
  input.select();
}

// --- Rename (sidebar) ---

function startRenameSidebar(id) {
  const session = sessions.get(id);
  if (!session) return;

  const nameEl = session.sidebarItem.querySelector('.session-item-name');
  const input = document.createElement('input');
  input.className = 'session-rename-input';
  input.value = session.name;

  const finish = async () => {
    const newName = input.value.trim() || session.name;
    applyRename(id, newName);
    nameEl.style.display = '';
    input.remove();
  };

  input.addEventListener('blur', finish);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') finish();
    if (e.key === 'Escape') { nameEl.style.display = ''; input.remove(); }
    e.stopPropagation();
  });

  nameEl.style.display = 'none';
  nameEl.parentNode.insertBefore(input, nameEl);
  input.focus();
  input.select();
}

// --- Apply rename to all UI ---

async function applyRename(id, newName) {
  const session = sessions.get(id);
  if (!session) return;

  session.name = newName;

  // Update tab
  const tabName = session.tab.querySelector('.tab-name');
  if (tabName) { tabName.textContent = newName; tabName.style.display = ''; }

  // Update sidebar
  const sidebarName = session.sidebarItem.querySelector('.session-item-name');
  if (sidebarName) { sidebarName.textContent = newName; sidebarName.style.display = ''; }

  // Update status bar
  if (activeSessionId === id) updateStatusBar(session);

  await apiRenameSession(id, newName);
}

// --- Context menu ---

function showContextMenu(e, id) {
  const menu = document.getElementById('contextMenu');
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';
  menu.classList.add('show');
  menu.dataset.sessionId = id;
}

document.getElementById('contextMenu').addEventListener('click', (e) => {
  const action = e.target.dataset.action;
  const id = e.target.closest('.context-menu').dataset.sessionId;
  if (action === 'rename') startRenameSidebar(id);
  if (action === 'close') closeSession(id);
  document.getElementById('contextMenu').classList.remove('show');
});

document.addEventListener('click', () => {
  document.getElementById('contextMenu').classList.remove('show');
});

// --- Sidebar toggle ---

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.classList.toggle('collapsed');
  // Re-fit terminal after transition
  setTimeout(() => {
    if (activeSessionId) {
      const s = sessions.get(activeSessionId);
      if (s) s.fitAddon.fit();
    }
  }, 250);
}

document.getElementById('sidebarCollapseBtn').addEventListener('click', toggleSidebar);
document.getElementById('sidebarOpenBtn').addEventListener('click', toggleSidebar);

// --- Keyboard shortcuts ---

document.addEventListener('keydown', (e) => {
  // Ctrl+Shift+T: new session
  if (e.ctrlKey && e.shiftKey && e.key === 'T') {
    e.preventDefault();
    showNewSessionModal();
    return;
  }

  // Ctrl+B: toggle sidebar
  if (e.ctrlKey && !e.shiftKey && e.key === 'b') {
    e.preventDefault();
    toggleSidebar();
    return;
  }

  // Ctrl+Shift+Left/Right: switch tabs
  if (e.ctrlKey && e.shiftKey && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
    e.preventDefault();
    const ids = [...sessions.keys()];
    if (ids.length < 2) return;
    const idx = ids.indexOf(activeSessionId);
    const next = e.key === 'ArrowRight'
      ? ids[(idx + 1) % ids.length]
      : ids[(idx - 1 + ids.length) % ids.length];
    switchToSession(next);
    return;
  }

  // Ctrl+Shift+W: close current tab
  if (e.ctrlKey && e.shiftKey && e.key === 'W') {
    e.preventDefault();
    if (activeSessionId) closeSession(activeSessionId);
    return;
  }
});

// --- Resize handling ---

window.addEventListener('resize', () => {
  if (activeSessionId) {
    const s = sessions.get(activeSessionId);
    if (s) s.fitAddon.fit();
  }
});

// --- New tab buttons ---

document.getElementById('newTabBtn').addEventListener('click', () => showNewSessionModal());
document.getElementById('newSessionBtn').addEventListener('click', () => showNewSessionModal());

// --- New session modal ---

let browserCurrentPath = '~';
let browserSelectedPath = null;

async function loadDir(path) {
  try {
    const res = await fetch(`/api/dirs?path=${encodeURIComponent(path)}`);
    const data = await res.json();
    if (!res.ok) return;
    browserCurrentPath = data.path;
    browserSelectedPath = data.path;
    document.getElementById('dirCurrentPath').textContent = shortenPath(data.path);
    const list = document.getElementById('dirList');
    if (data.dirs.length === 0) {
      list.innerHTML = '<li class="dir-empty">No subdirectories</li>';
    } else {
      list.innerHTML = data.dirs.map(d =>
        `<li class="dir-item" data-name="${escapeHtml(d)}"><span class="dir-icon">📁</span>${escapeHtml(d)}</li>`
      ).join('');
    }
    list.scrollTop = 0;
  } catch (e) {
    console.error('Failed to load dirs:', e);
  }
}

document.getElementById('dirList').addEventListener('click', (e) => {
  const item = e.target.closest('.dir-item');
  if (!item) return;
  const name = item.dataset.name;
  loadDir(browserCurrentPath + '/' + name);
});

document.getElementById('dirUpBtn').addEventListener('click', () => {
  const parent = browserCurrentPath.replace(/\/[^/]*$/, '') || '/';
  loadDir(parent);
});

document.getElementById('dirSelectBtn').addEventListener('click', () => {
  browserSelectedPath = browserCurrentPath;
  confirmNewSession();
});

function showNewSessionModal() {
  const modal = document.getElementById('newSessionModal');
  const nameInput = document.getElementById('modalSessionName');
  sessionCounter++;
  nameInput.value = '';
  nameInput.placeholder = `Session ${sessionCounter}`;
  browserSelectedPath = null;
  modal.classList.add('show');
  loadDir('~');
  nameInput.focus();
}

function hideNewSessionModal() {
  document.getElementById('newSessionModal').classList.remove('show');
}

async function confirmNewSession() {
  const name = document.getElementById('modalSessionName').value.trim() || `Session ${sessionCounter}`;
  const dir = browserSelectedPath || undefined;
  hideNewSessionModal();
  try {
    await createSession(name, dir);
  } catch (e) {
    alert(e.message);
  }
}

document.getElementById('modalCancel').addEventListener('click', hideNewSessionModal);
document.getElementById('modalCreate').addEventListener('click', confirmNewSession);

document.getElementById('newSessionModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) hideNewSessionModal();
});

document.getElementById('newSessionModal').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') confirmNewSession();
  if (e.key === 'Escape') hideNewSessionModal();
});

// --- Restore sessions on load ---

(async () => {
  const existing = await apiListSessions();
  if (existing.length === 0) {
    updateEmptyState();
    updateSessionCount();
  } else {
    for (const s of existing) {
      sessionCounter++;
      const id = s.id;
      const { terminal, fitAddon } = createTerminal();

      const pane = document.createElement('div');
      pane.className = 'terminal-pane';
      pane.id = `pane-${id}`;
      document.getElementById('terminalArea').appendChild(pane);
      terminal.open(pane);

      const ws = connectWebSocket(id, terminal, fitAddon);
      const tab = createTabElement(id, s.name);
      const sidebarItem = createSidebarItem(id, s.name);

      sessions.set(id, {
        terminal, ws, tab, pane, sidebarItem, fitAddon,
        name: s.name, alive: s.alive, createdAt: new Date(s.created_at * 1000).getTime()
      });
    }

    switchToSession(existing[0].id);
    updateEmptyState();
    updateSessionCount();
  }
})();

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// --- External processes ---

function formatUptime(startTimeSec) {
  const elapsed = Math.floor(Date.now() / 1000 - startTimeSec);
  if (elapsed < 60) return `${elapsed}s`;
  if (elapsed < 3600) return `${Math.floor(elapsed / 60)}m`;
  const h = Math.floor(elapsed / 3600);
  const m = Math.floor((elapsed % 3600) / 60);
  return `${h}h ${m}m`;
}

function shortenPath(p) {
  const home = '/home/tykim';
  if (p.startsWith(home)) return '~' + p.slice(home.length);
  return p;
}

async function refreshExternalProcesses() {
  try {
    const res = await fetch('/api/external');
    const procs = await res.json();

    const list = document.getElementById('externalList');
    const badge = document.getElementById('externalBadge');
    badge.textContent = procs.length;

    if (procs.length === 0) {
      list.innerHTML = '<div class="external-empty">No external sessions detected</div>';
      return;
    }

    list.innerHTML = procs.map(p => `
      <div class="external-item" data-cwd="${escapeHtml(p.cwd)}" data-tty="${escapeHtml(p.tty)}" data-pid="${p.pid}">
        <span class="status-dot"></span>
        <div class="external-item-info">
          <div class="external-item-name">
            <span class="ext-tag">${escapeHtml(p.tty)}</span>
            claude ${escapeHtml(p.args || '')}
          </div>
          <div class="external-item-meta">
            ${escapeHtml(shortenPath(p.cwd))} &middot; ${formatUptime(p.start_time)}
          </div>
        </div>
        <div class="external-item-actions">
          <button class="ext-kill-btn" title="Kill this session">
            <svg class="icon" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
      </div>
    `).join('');

    // Attach click handlers
    list.querySelectorAll('.external-item').forEach(item => {
      // Click on item body → action menu
      item.addEventListener('click', (e) => {
        if (e.target.closest('.ext-kill-btn')) return;
        e.stopPropagation();
        showExtActionMenu(e, item.dataset.cwd, item.dataset.tty, item.dataset.pid);
      });

      // Click on X → kill process
      item.querySelector('.ext-kill-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        killExternalProcess(item.dataset.pid, item.dataset.tty);
      });
    });
  } catch (e) {
    // silently ignore
  }
}

// --- Kill external process ---

async function killExternalProcess(pid, tty) {
  if (!confirm(`${tty} (PID ${pid}) 세션을 종료하시겠습니까?`)) return;

  try {
    const res = await fetch(`/api/external/${pid}`, { method: 'DELETE' });
    const data = await res.json();
    if (res.ok) {
      // Refresh the list immediately
      refreshExternalProcesses();
    } else {
      alert(`Failed: ${data.error}`);
    }
  } catch (e) {
    alert(`Error: ${e.message}`);
  }
}

// --- External action menu ---

let extMenuState = { cwd: '', tty: '', pid: '' };

function showExtActionMenu(e, cwd, tty, pid) {
  const menu = document.getElementById('extActionMenu');
  document.getElementById('extActionTitle').textContent = `${tty} (PID ${pid})`;
  document.getElementById('extActionPath').textContent = shortenPath(cwd);
  extMenuState = { cwd, tty, pid };

  // Position near click
  const rect = e.currentTarget.getBoundingClientRect();
  menu.style.left = (rect.right + 4) + 'px';
  menu.style.top = rect.top + 'px';

  // If it would go off-screen right, show to the left instead
  menu.classList.add('show');
  const menuRect = menu.getBoundingClientRect();
  if (menuRect.right > window.innerWidth) {
    menu.style.left = (rect.left - menuRect.width - 4) + 'px';
  }
  if (menuRect.bottom > window.innerHeight) {
    menu.style.top = (window.innerHeight - menuRect.height - 8) + 'px';
  }
}

document.getElementById('extActionMenu').addEventListener('click', (e) => {
  const btn = e.target.closest('.ext-action-item');
  if (!btn) return;

  const action = btn.dataset.action;
  const { cwd, tty } = extMenuState;
  const label = `${tty} (${shortenPath(cwd)})`;

  if (action === 'continue') {
    createSession(label, cwd, ['--continue']);
  } else if (action === 'resume') {
    createSession(label, cwd, ['--resume']);
  } else if (action === 'new') {
    createSession(label, cwd);
  }

  document.getElementById('extActionMenu').classList.remove('show');
});

// Close menu on outside click
document.addEventListener('click', (e) => {
  if (!e.target.closest('.ext-action-menu') && !e.target.closest('.external-item')) {
    document.getElementById('extActionMenu').classList.remove('show');
  }
});

// Poll every 5 seconds
refreshExternalProcesses();
setInterval(refreshExternalProcesses, 5000);
</script>
